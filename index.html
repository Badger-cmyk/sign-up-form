<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo-container">
                <img src="./images/odin-lined.png" alt="Logo" class="sidebar-img">
                <span class="logo-text">ODIN</span>
            </div>

            <p class="credit">
                Photo by
                <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA"
                target="_blank">
                    Halie West
                </a>
                on
                <a href="https://unsplash.com" target="_blank">Unsplash</a>
            </p>
        </div>

        <div class="right">
            <div class="first">
                <h4>This is not a real online service! You know you need something
                    <br>like this in your life to help you realize your deepest dreams.
                    <br>Sign up <em>now</em> to get started.
                    <br><br>You <em>know</em> you want to.
                </h4>
            </div>

            <div class="second">
                <h4 class="heading">Let's do this!</h4>

                <form action="/signup" method="post" id="signupForm">
                    <div class="form-container">
                        <div class="left-form">
                            <div class="form-div">
                                <label for="firstName">FIRST NAME</label>
                                <input type="text" name="firstName" id="firstName" placeholder="Thor" maxlength="10" required>
                            </div>
                            <div class="form-div">
                                <label for="email">EMAIL</label>
                                <input type="email" name="email" id="email" placeholder="thorodinson@gmail.com" required>
                            </div>
                            <div class="form-div">
                                <label for="firstName">PASSWORD</label>
                                <input type="password" name="password" id="password" minlength="8" required>
                            </div>
                        </div>

                        <div class="right-form">
                            <div class="form-div">
                                <label for="lastName">LAST NAME</label>
                                <input type="text" name="lastName" id="lastName" placeholder="Odinson" maxlength="10" required>
                            </div>
                            <div class="form-div">
                                <label for="tel">PHONE NUMBER</label>
                                <input type="tel" name="tel" id="tel" pattern="\+\d{1,3}[\s\-]?\d{4,14}" required>
                            </div>
                            <div class="form-div">
                                <label for="confirmPassword">CONFIRM PASSWORD</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" minlength="8" required>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="third">
                <button type="submit" form="signupForm">Create Account</button>
                <p>Already have an account? <a href="/login">Log in</a></p>
            </div>
        </div>
    </div>
</body>
</html>
